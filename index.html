<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LDB 2026 — Auction Command</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <body>
    <div id="root"></div>

            el.innerHTML =
              '<div style="padding:28px;max-width:42rem;font:15px/1.5 system-ui,-apple-system,sans-serif;color:#e2e8f4;background:#07090e;min-height:100vh">' +

              '<p style="margin:0 0 10px;color:#9ba8c4">ES modules must be served over HTTP. From the project folder run:</p>' +
              '<p style="margin:0 0 16px;font-family:ui-monospace,monospace;color:#c8f135">npm run dev</p>' +
              '<p style="margin:0;color:#9ba8c4">Then open the <strong>localhost</strong> URL shown in the terminal (not this HTML file).</p></div>'
          }
        }
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
